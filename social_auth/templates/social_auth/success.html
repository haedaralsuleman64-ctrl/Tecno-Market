<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEcNO Market - نجاح</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white text-center">
                        <h4><i class="bi bi-check-circle"></i> نجاح المصادقة</h4>
                    </div>
                    <div class="card-body text-center">
                        <div class="mb-4">
                            <i class="bi bi-google" style="font-size: 3rem; color: #0F9D58;"></i>
                        </div>
                        <p class="card-text lead">{{ message }}</p>
                        
                        {% if user_info %}
                        <div class="alert alert-info mt-3">
                            <h6>معلومات المستخدم المستلمة:</h6>
                            <p><strong>الاسم:</strong> {{ user_info.name }}</p>
                            <p><strong>البريد الإلكتروني:</strong> {{ user_info.email }}</p>
                            <p><strong>المعرف:</strong> {{ user_info.sub }}</p>
                        </div>
                        {% endif %}
                        
                        <div class="mt-4">
                            <a href="/accounts/signup/" class="btn btn-primary me-2">
                                <i class="bi bi-arrow-left"></i> العودة إلى التسجيل
                            </a>
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="bi bi-house"></i> الصفحة الرئيسية
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
